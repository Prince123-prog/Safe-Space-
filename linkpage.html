<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Private Love Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      max-width: 100%;
      height: 100vh;
      color: #dadae6;
      display: flex;
      align-items: center;
      background: radial-gradient(circle at top, #010136, #070101);
      margin: 0;
      animation: backgroundAnim 50s ease-in infinite;
      border:3px solid #c9b9be;
      border-radius:3px ;
    }

    @keyframes backgroundAnim {
      0% {
        background: radial-gradient(circle at top, #121224, #07010198);
      }

      25% {
        background: radial-gradient(circle at top, #200f2b, #0f2229);
      }

      50% {
        background: radial-gradient(circle at top, #383702, #01241e);
      }

      75% {
        background: radial-gradient(circle at top, #1b0b23, #140110);
      }

      100% {
        background: radial-gradient(circle at top, #2c010fa2, #021f1dcb);
      }

    }

    section {
      padding: 20px;
      text-align: center;
      background-color: #3a2a36;
      border: 1px solid #0a0a50;
      border-radius: 25px;
      font-family: monaco;
      width: min(90%, 480px);
      height: auto;
      box-shadow: 0 8px 24px rgba(58, 42, 54, 0.18), 0 4px 12px rgba(10, 10, 80, 0.12);
      font-size: clamp(16px, 2vw, 20px);
      margin: 50% auto;
      align-content: center;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      touch-action: manipulation;
      cursor: pointer;
    }

    section:active {
      cursor: pointer;
      background-color: #c24b4bec;
      transform: scale(0.98);
      transition: all 0.15s ease;
    }

    section:hover {
      cursor: pointer;
      background-color: #c24b4bec;
      transform: scaleX(1.1);
      transition: all 0.25s ease;
    }

    @media (hover: hover) and (min-width: 768px) {
      section:hover {
        transform: scale(1.03);
        transition: transform 0.25s ease;
        cursor: pointer;
        background-color: #c24b4bec;
        border: 5px solid #ff4fd8;
      }

      section:active {
        transform: scale(1.03);
      }
    }

    button {
      display: inline-block;
      width: 100%;
      max-width: 320px;
      padding: 12px 18px;
      margin: 8px auto;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #ff7eb3, #7afcff);
      color: #111;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: all 0.25s ease;
    }

    #link a {
      color: #ffd1ff;
      word-break: break-word;
      display: block;
      margin-top: 15px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .copy-btn {
      display: none;
      width: auto;
      min-width: 150px;
      padding: 8px 15px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      font-size: 0.85rem;
      margin-top: 10px;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .copy-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: scale(1.05);
    }

    .copy-btn.success {
      background: rgba(0, 255, 100, 0.2);
      border-color: rgba(0, 255, 100, 0.4);
      color: #afffaf;
    }

    header {
      position: fixed;
      margin-bottom: 20px;
      top: 12px;
      left: 15px;
      right: 12px;
      font-size: clamp(16px, 2.2vw, 24px);
      text-align: left;
    }

    @media (max-width:480px) {
      body {
        align-items: flex-start;
        padding-top: 80px
      }

      header {
        position: fixed;
        left: 12px;
        right: 12px;
        top: 8px;
        font-size: 16px;
        text-align: center
      }

      section {
        width: 94%;
        padding: 16px
      }

      button {
        padding: 14px
      }
      
    }

    /* Ensure About Programmer link is visible on all viewports */
    .programmer {
      display: block !important;
      margin: 12px auto !important;
      text-align: center !important;
      color: #111 !important;
      font-size: 16px !important;
      background: transparent !important;
      position: fixed !important;
      bottom: 12px !important;
      left: 0 !important;
      right: 0 !important;
      z-index: 1000 !important;
      width: 80%;
      pointer-events: auto !important;
    }

    .programmer a {
      color: #111 !important;
      background: #ff4fd8;
      padding: 8px 14px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
        }
       
    
  </style>
</head>

<body>
  <header>
    <h2>Generate a private chat link and express your self without fear. Your conversations are
      encrypted and secure.</h2>
  </header>
  <section onclick="generateLink(event)">
    <button id="genBtn">Generate Link</button>
    <div id="linkArea">
      <p id="link"></p>
      <button id="copyBtn" class="copy-btn" onclick="copyToClipboard(event)">Copy Link</button>
    </div>
  </section>
 
  <script>
    let generatedLink = "";

    function generateLink(e) {
      // Prevent event bubbling if the button inside section is clicked
      if (e) {
        // Only trigger if clicking the section itself or the generate button
        if (e.target.id !== "genBtn" && e.currentTarget !== e.target) {
          if (e.target.id === "copyBtn") return;
        }
      }

      // Generate a secure random key for encryption
      const arr = new Uint8Array(16);
      crypto.getRandomValues(arr);
      const key = btoa(String.fromCharCode(...arr)).replace(/[+/=]/g, "");

      // ✅ Generate link with secure key hash parameter
      const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
      generatedLink = `${baseUrl}/private-chat.html#key=${key}`;

      document.getElementById("link").innerHTML =
        `<a href="${generatedLink}" target="_blank">${generatedLink}</a>`;

      document.getElementById("copyBtn").style.display = "inline-block";
    }

    async function copyToClipboard(e) {
      if (e) e.stopPropagation();
      if (!generatedLink) return;

      try {
        await navigator.clipboard.writeText(generatedLink);
        const copyBtn = document.getElementById("copyBtn");
        const originalText = copyBtn.innerText;
        copyBtn.innerText = "COPIED! ✅";
        copyBtn.classList.add("success");

        setTimeout(() => {
          copyBtn.innerText = originalText;
          copyBtn.classList.remove("success");
        }, 2000);
      } catch (err) {
        console.error('Failed to copy: ', err);
        alert("Failed to copy link. Please select and copy manually.");
      }
    }
  </script>
  <div class="programmer ">
   <a href="Programmer.html">About Programmers</a>
  </div>
</body>
