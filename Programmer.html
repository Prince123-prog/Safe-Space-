<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Programmers</title>
    <style>
        body{
            background-color: #d4c21e;
            color: #000000;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            background:radial-gradient(circle at top, #0b0b18, #000);
        }
        .container{
            box-sizing: border-box;
            max-width: 600px;
            margin: 50px auto;
            padding: 50px;
            border: 5px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            font-size: 1.125rem;
                background: linear-gradient(135deg, #ff4fd8, #7a7cff);
                color: #fff;
                text-align: center;
           
        }
        .contact{
            display: inline-block;
            font-size: 1rem;
            font-weight: 700;
            color: #333;
            font-family: Monaco, 'Courier New', monospace;
            background-color: aqua;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            margin: 20px auto;
        }
        .contact a{ color: inherit; text-decoration: none; }
        .contact:hover{
            background-color: #00ff6a;
            color: #000;
            transition: background-color .3s ease, color .3s ease, transform .15s ease;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.12);
        }
    </style>
</head>
<body>
    <main class="container">
        <h1>About Programmer</h1>
