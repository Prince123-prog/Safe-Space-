<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Secure Chat Room</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            max-width: 100%;
            height: 100vh;
            background: radial-gradient(circle at top, #10253f, #06110f 58%, #020504);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            animation: backgroundAnim 50s ease-in infinite;
            overflow: hidden;
        }

        @keyframes backgroundAnim {
            0% {
                background: radial-gradient(circle at top, #10253f, #06110f);
            }

            25% {
                background: radial-gradient(circle at top, #0f2f38, #071512);
            }

            50% {
                background: radial-gradient(circle at top, #063b3a, #021f1d);
            }

            75% {
                background: radial-gradient(circle at top, #082f49, #07110f);
            }

            100% {
                background: radial-gradient(circle at top, #0f172a, #021f1dcb);
            }
        }

        .chat-container {
            width: 90%;
            max-width: 550px;
            background: rgba(7, 17, 22, 0.78);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(94, 234, 212, 0.22);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.34), 0 0 28px rgba(45, 212, 191, 0.12);
            position: relative;
        }

        .title {
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.2rem;
            color: #5eead4;
            font-weight: 500;
        }

        .safe-box {
            margin: 0 auto 12px;
            padding: 10px 16px;
            background: linear-gradient(90deg, rgba(45, 212, 191, 0.14), rgba(56, 189, 248, 0.08));
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #d8c8c7;
            font-size: 0.9rem;
            text-align: center;
            border-radius: 12px;
            font-weight: 500;
            letter-spacing: 0.3px;
            text-transform: capitalize;
        }

        .safe-notice {
            position: absolute;
            top: 18px;
            right: 18px;
            padding: 10px 14px;
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.65), rgba(10, 15, 20, 0.5));
            color: #bfffe8;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(6px);
            font-weight: 600;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            animation: moveCorners 12s linear infinite;
            width: clamp(100px, 15vw, 220px);
            pointer-events: none;
        }

        @keyframes moveCorners {
            0% {
                background-color: rgba(255, 0, 0, 0.2);
                left: 0px;
                top: 0px;
            }

            25% {
                background-color: rgba(255, 255, 0, 0.2);
                left: calc(100% - 150px);
                top: 0px;
            }

            50% {
                background-color: rgba(0, 0, 255, 0.2);
                left: calc(100% - 150px);
                top: calc(100vh - 50px);
            }

            75% {
                background-color: rgba(0, 255, 0, 0.2);
                left: 0px;
                top: calc(100vh - 50px);
            }

            100% {
                background-color: rgba(255, 0, 0, 0.2);
                left: 0px;
                top: 0px;
            }
        }

        @media (max-width: 600px) {
            .safe-notice {
                display: none;
            }
        }

        .messages {
            height: 300px;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 10px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.1);
        }

        /* Private horizontal scrolling - hide scrollbar */
        .messages::-webkit-scrollbar {
            width: 6px;
        }
        .messages::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: rgba(45, 212, 191, 0.42);
            border-radius: 3px;
        }

        .msg {
            background: rgba(56, 189, 248, 0.12);
            padding: 10px 14px;
            border-radius: 15px;
            margin: 8px 0;
            animation: fadeIn 0.4s ease;
            word-wrap: break-word;
            font-size: 0.95rem;
            max-width: 85%;
        }

        /* Sender messages - right aligned, different color */
        .msg.sender {
            background: linear-gradient(135deg, rgba(45, 212, 191, 0.22), rgba(56, 189, 248, 0.16));
            margin-left: auto;
            border-right: 3px solid #2dd4bf;
        }

        /* Receiver messages - left aligned */
        .msg.receiver {
            background: rgba(56, 189, 248, 0.12);
            margin-right: auto;
            border-left: 3px solid #38bdf8;
        }

        /* Online status indicator */
        .online-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            padding: 4px 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            margin-bottom: 10px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
            animation: pulse 2s infinite;
        }

        .online-dot.active {
            background: #00ff88;
            box-shadow: 0 0 8px #00ff88;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .online-dot.active {
            animation: pulse 2s infinite;
        }

        .online-count {
            display: none;
            min-width: 18px;
            height: 18px;
            padding: 0 6px;
            border-radius: 999px;
            background: rgba(0, 255, 136, 0.18);
            border: 1px solid rgba(0, 255, 136, 0.45);
            color: #bfffe8;
            font-size: 0.7rem;
            line-height: 16px;
            text-align: center;
        }

        .online-count.visible {
            display: inline-block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-area {
            margin-top: 15px;
        }

        .composed-input {
            display: flex;
            align-items: center;
            background: #111;
            border-radius: 20px;
            padding: 5px 10px;
            gap: 8px;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Private horizontal scrolling - hide scrollbar */
        .composed-input::-webkit-scrollbar {
            display: none;
        }

        input#input {
            flex: 1;
            min-width: 0;
            padding: 10px;
            background: transparent;
            color: #fff;
            border: none;
            outline: none;
            font-size: 1rem;
        }

        .action-buttons {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            align-items: center;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2dd4bf, #38bdf8);
            color: #fff;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
        }

        .icon-btn:hover {
            transform: scale(1.1);
            filter: brightness(1.1);
        }

        .icon-btn:active {
            transform: scale(0.9);
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
        }

        /* File Input - Hidden but functional */
        input#fileInput {
            display: none;
        }

        /* Media Message Display */
        .msg-media {
            margin-top: 8px;
            border-radius: 10px;
            overflow: hidden;
            max-width: 100%;
            background: rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .msg-media img,
        .msg-media video {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
            cursor: pointer;
            transition: filter 0.2s;
        }

        .msg-media:not(.locked):not(.viewed) img:hover,
        .msg-media:not(.locked):not(.viewed) video:hover {
            filter: brightness(0.9);
        }

        .msg-media video {
            width: 100%;
        }

        /* View-Once Badge */
        .view-once-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(20, 184, 166, 0.92);
            color: #fff;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            z-index: 10;
        }

        .view-once-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.45);
            color: #fff;
            font-size: 0.85rem;
            font-weight: 700;
            text-align: center;
            padding: 16px;
            z-index: 8;
            cursor: pointer;
        }

        .media-done-btn {
            position: absolute;
            right: 8px;
            bottom: 8px;
            display: none;
            border: none;
            border-radius: 16px;
            padding: 7px 12px;
            background: rgba(45, 212, 191, 0.95);
            color: #02110f;
            font-weight: 700;
            cursor: pointer;
            z-index: 12;
        }

        .msg-media.locked img,
        .msg-media.locked video,
        .msg-media.viewed img,
        .msg-media.viewed video {
            filter: blur(10px);
        }

        .msg-media.locked video,
        .msg-media.viewed video {
            pointer-events: none;
        }

        .msg-media.revealed .view-once-overlay {
            display: none;
        }

        .msg-media.revealed .media-done-btn {
            display: block;
        }

        .msg-media.viewed .view-once-overlay,
        .msg-media.viewed .media-done-btn {
            display: none;
        }

        /* Viewed/Expired State */
        .msg-media.viewed {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .msg-media.viewed::after {
            content: 'Viewed';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            text-align: center;
            width: 80%;
            z-index: 20;
        }

        .loading-spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #2dd4bf;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            font-size: 0.7rem;
            opacity: 0.5;
            margin-top: 10px;
        }

        .link-btn {
            background: #2dd4bf;
            color: #02110f;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 10px;
            width: 100%;
        }
        /* When toggled, remove animated/background visuals for accessibility or preference */
        .bg-off {
            background: none !important;
            background-color: #ffffffb7 !important;
            color: #111 !important;
            animation: none !important;
        }

        /* Mobile Responsive Styles */
        @media (max-width: 480px) {
            body {
                padding: 10px;
                height: 100dvh;
                overflow: hidden;
            }

            .chat-container {
                width: 100%;
                max-width: 100%;
                height: 100%;
                padding: 12px;
                border-radius: 15px;
                display: flex;
                flex-direction: column;
            }

            .title {
                font-size: 1rem;
                margin-bottom: 10px;
            }

            .safe-box {
                font-size: 0.75rem;
                padding: 8px 12px;
                margin-bottom: 10px;
            }

            .link-btn {
                padding: 10px 12px;
                font-size: 0.85rem;
            }

            .messages {
                flex: 1;
                height: auto;
                min-height: 200px;
                padding: 8px;
                font-size: 0.9rem;
                overflow-x: hidden;
            }

            .msg {
                padding: 8px 10px;
                font-size: 0.85rem;
                max-width: 90%;
            }

            .input-area {
                margin-top: 10px;
            }

            .composed-input {
                padding: 5px 8px;
                gap: 4px;
                overflow-x: hidden;
                -webkit-overflow-scrolling: touch;
                -ms-overflow-style: none;
                scrollbar-width: none;
            }

            /* Hide horizontal scrollbar in input */
            .composed-input::-webkit-scrollbar {
                display: none;
            }

            input#input {
                padding: 8px;
                font-size: 0.9rem;
            }

            .icon-btn {
                width: 36px;
                height: 36px;
            }

            .icon-btn svg {
                width: 18px;
                height: 18px;
            }

            .footer {
                font-size: 0.6rem;
                margin-top: 8px;
            }
        }

        /* Tablet Styles */
        @media (min-width: 481px) and (max-width: 768px) {
            .chat-container {
                width: 95%;
                padding: 15px;
            }

            .messages {
                height: 250px;
            }
        }

        /* Small mobile adjustments */
        @media (max-width: 360px) {
            .chat-container {
                padding: 10px;
            }

            .title {
                font-size: 0.9rem;
            }

            .safe-box {
                font-size: 0.7rem;
            }

            .msg {
                font-size: 0.8rem;
                padding: 6px 8px;
            }
        }
    </style>
</head>

    <script>
        /* --------------------------
                                    CRYPTO LOGIC
                                    -------------------------- */
        let cryptoKey = null;
        const params = new URLSearchParams(location.hash.substring(1));
        const sharedSecret = params.get("key");

        if (!sharedSecret) {
            document.getElementById("messages").innerHTML = `<div class='msg' style='background:rgba(255,165,0,0.2)'>No chat room connected. Please use a secure link or generate one below.</div>`;
        }

        let cryptoReadyPromise = Promise.resolve();

        async function initCrypto(secret) {
            const enc = new TextEncoder();
            try {
                const baseKey = await crypto.subtle.importKey(
                    "raw", enc.encode(secret), "PBKDF2", false, ["deriveKey"]
                );
                cryptoKey = await crypto.subtle.deriveKey(
                    { name: "PBKDF2", salt: enc.encode("private-chat"), iterations: 100000, hash: "SHA-256" },
                    baseKey,
                    { name: "AES-GCM", length: 256 },
                    false,
                    ["encrypt", "decrypt"]
                );
                console.log("Encryption initialized");
            } catch (e) {
                console.error("Crypto init failed", e);
            }
        }

        if (sharedSecret) cryptoReadyPromise = initCrypto(sharedSecret);

        function arrayBufferToBase64(buffer) {
            const bytes = new Uint8Array(buffer);
            const chunkSize = 0x8000;
            let binary = "";

            for (let i = 0; i < bytes.length; i += chunkSize) {
                binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
            }

            return btoa(binary);
        }

        function base64ToUint8Array(base64) {
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);

            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }

            return bytes;
        }

        async function encryptData(data) {
            if (!cryptoKey) {
                await cryptoReadyPromise;
                if (!cryptoKey) return null;
            }
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encrypted = await crypto.subtle.encrypt(
                { name: "AES-GCM", iv },
                cryptoKey,
                new TextEncoder().encode(data)
            );
            return {
                payload: arrayBufferToBase64(encrypted),
                iv: arrayBufferToBase64(iv)
            };
        }

        async function decryptData(encryptedB64, ivB64) {
            if (!cryptoKey) return "Error: No Key";
            try {
                const encrypted = base64ToUint8Array(encryptedB64);
                const iv = base64ToUint8Array(ivB64);
                const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, cryptoKey, encrypted);
                return new TextDecoder().decode(decrypted);
            } catch (e) {
                return "[Decryption Failed]";
            }
        }

      <script>
// ==========================
// CHAT LOGIC
// ==========================

const messagesDiv = document.getElementById("messages");
const input = document.getElementById("input");

let chatSession = [];
let dbRef = null;
const pageLoadedAt = Date.now();
const renderingMessages = new Set();
const deletionTimers = new Map();

// Unique user ID for this browser session
let currentUserId = sessionStorage.getItem('chatUserId');
if (!currentUserId) {
    currentUserId = crypto.randomUUID();
    sessionStorage.setItem('chatUserId', currentUserId);
}
console.log("User:", currentUserId);

// ==========================
// LOAD CHAT
// ==========================
window.onload = async () => {
    if (!sharedSecret) return;
    if (!db) {
        alert("Chat service is unavailable. Please refresh and try again.");
        return;
    }

    dbRef = db.ref(`chats/${sharedSecret}`);

    dbRef.on('child_added', async (snapshot) => {
        const msg = snapshot.val();
        msg.dbKey = snapshot.key;

        if (isStaleTextMessage(msg)) {
            dbRef.child(msg.dbKey).remove();
            return;
        }

        if (!renderingMessages.has(msg.id)) {
            renderingMessages.add(msg.id);
            await render(msg);
        }
    });
};

function isStaleTextMessage(msg) {
    return Boolean(msg.text && !msg.file && (msg.time || 0) < pageLoadedAt);
}

// ==========================
// SEND TEXT
// ==========================
async function send() {
    if (!sharedSecret) return alert("Open a chat link first");

    const textValue = input.value.trim();
    if (!textValue) return;

    const enc = await encryptData(textValue);
    if (!enc) {
        alert("Encryption is not ready yet. Please wait a moment and try again.");
        return;
    }

    const msg = {
        id: Date.now() + "_" + Math.random(),
        time: Date.now(),
        senderId: currentUserId,
        text: enc
    };

    finalizeSend(msg);
    input.value = "";
}

// ==========================
// FINAL SEND
// ==========================
function finalizeSend(msg) {
    if (!dbRef) return;

    const newRef = dbRef.push();
    msg.dbKey = newRef.key;

    newRef.set(msg);
}

// ==========================
// FILE HANDLING
// ==========================
function openFileDialog() {
    if (!sharedSecret) {
        alert("Open a chat first");
        return;
    }

    const fileInput = document.getElementById('fileInput');
    fileInput.value = "";
    fileInput.click();
}

function handleFileSelect(e) {
    const file = e.target.files[0];
    if (!file) return;

    sendFile(file);
}

function sendFile(file) {
    const reader = new FileReader();

    reader.onload = async (e) => {
        const fileData = e.target.result;

        const msg = {
            id: Date.now() + "_" + Math.random(),
            time: Date.now(),
            senderId: currentUserId,
            type: file.type.startsWith('image/') ? 'image' : 'video',
            fileName: file.name
        };

        const enc = await encryptData(fileData);
        msg.file = enc;

        finalizeSend(msg);
    };

    reader.readAsDataURL(file);
}

// ==========================
// RENDER
// ==========================
async function render(msg) {
    const div = document.createElement("div");
    div.className = "msg";
    div.id = `msg-${msg.id}`;

    // sender / receiver
    if (msg.senderId === currentUserId) {
        div.classList.add("sender");
    } else {
        div.classList.add("receiver");
    }

    // TEXT
    if (msg.text) {
        const txt = await decryptData(msg.text.payload, msg.text.iv);
        div.innerText = txt;
    }

    // FILE
    if (msg.file && msg.type) {
        const data = await decryptFileData(msg.file.payload, msg.file.iv);

        const mediaDiv = document.createElement("div");
        mediaDiv.className = "msg-media";

        if (msg.type === "image") {
            const img = document.createElement("img");
            img.src = data;

            if (msg.senderId !== currentUserId) {
                setupReceiverMedia(mediaDiv, img, msg, false);
            } else {
                img.onclick = () => downloadFile(data, msg.fileName);
            }

            mediaDiv.appendChild(img);
        }

        if (msg.type === "video") {
            const video = document.createElement("video");
            video.src = data;
            video.controls = true;

            if (msg.senderId !== currentUserId) {
                video.controls = false;
                setupReceiverMedia(mediaDiv, video, msg, true);
            }

            mediaDiv.appendChild(video);
        }

        div.appendChild(mediaDiv);
    }

    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;

    scheduleAutoDelete(msg, div);
}

// ==========================
// VIEW-ONCE LOGIC
// ==========================
function setupReceiverMedia(container, media, msg, isVideo) {
    container.classList.add("locked");

    const overlay = document.createElement("div");
    overlay.className = "view-once-overlay";
    overlay.innerText = "Click to view";
    container.appendChild(overlay);

    container.onclick = () => {
        container.classList.remove("locked");
        overlay.remove();

        if (isVideo) {
            media.controls = true;
            media.play();
            media.onended = () => markViewed(container);
        } else {
            media.onclick = () => markViewed(container);
        }
    };
}

function markViewed(container) {
    container.classList.add("viewed");
}

// ==========================
// DECRYPT FILE
// ==========================
async function decryptFileData(payload, iv) {
    try {
        const decrypted = await decryptData(payload, iv);
        return decrypted;
    } catch {
        return null;
    }
}

// ==========================
// DOWNLOAD
// ==========================
function downloadFile(data, name) {
    const a = document.createElement("a");
    a.href = data;
    a.download = name || "file";
    a.click();
}

// ==========================
// AUTO DELETE
// ==========================
function scheduleAutoDelete(msg, div) {
    const timerKey = msg.dbKey || msg.id;
    if (deletionTimers.has(timerKey)) {
        clearTimeout(deletionTimers.get(timerKey));
    }

    const expiresAt = (msg.time || Date.now()) + 300000;
    const delay = Math.max(0, expiresAt - Date.now());
    const timerId = setTimeout(() => {
        div.remove();
        if (msg.dbKey && dbRef) {
            dbRef.child(msg.dbKey).remove();
        }
        deletionTimers.delete(timerKey);
    }, delay);

    deletionTimers.set(timerKey, timerId);
}

// ENTER SEND
input.onkeypress = (e) => {
    if (e.key === "Enter") send();

    <script>
        /* ========================================
           FILE SHARING FUNCTIONALITY
           ======================================== */
        
        // File size limits (10MB for images, 50MB for videos)
        const FILE_SIZE_LIMITS = {
            image: 10 * 1024 * 1024,  // 10MB
            video: 50 * 1024 * 1024   // 50MB
        };

        // Allowed MIME types
        const ALLOWED_TYPES = {
            images: ['image/jpeg', 'image/png', 'image/gif', 'image/webp', 'image/bmp'],
            videos: ['video/mp4', 'video/webm', 'video/ogg', 'video/quicktime']
        };

        function openFileDialog() {
            if (!sharedSecret) {
                alert("Please generate/open a secure link first!");
                return;
            }
            document.getElementById('fileInput').click();
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Validate file type
            const isImage = ALLOWED_TYPES.images.includes(file.type);
            const isVideo = ALLOWED_TYPES.videos.includes(file.type);

            if (!isImage && !isVideo) {
                alert("Only images and videos are allowed!");
                return;
            }

            // Validate file size
            const limit = isImage ? FILE_SIZE_LIMITS.image : FILE_SIZE_LIMITS.video;
            if (file.size > limit) {
                const maxMB = limit / (1024 * 1024);
                alert(`File too large! Maximum size: ${maxMB}MB`);
                return;
            }

            // Process file
            sendFile(file);

            // Reset input
            event.target.value = '';
        }

        function sendFile(file) {
            const reader = new FileReader();

            reader.onload = async (e) => {
                const fileData = e.target.result;
                const isImage = ALLOWED_TYPES.images.includes(file.type);
                const isVideo = ALLOWED_TYPES.videos.includes(file.type);

                let msgObj = {
                    id: Date.now(),
                    time: Date.now(),
                    senderId: currentUserId,
                    type: isImage ? 'image' : 'video',
                    fileName: file.name,
                    fileSize: file.size,
                    mimeType: file.type,
                    viewOnce: true
                };

                // Encrypt file data
                const enc = await encryptData(fileData);
                if (!enc) {
                    alert("Encryption not ready. Please try again.");
                    return;
                }

                msgObj.file = enc;

                finalizeSend(msgObj);
            };

            reader.onerror = () => {
                alert("Error reading file. Please try again.");
            };

            // Store media as a data URL so images and videos render consistently after decryption.
            reader.readAsDataURL(file);
        }

        // Store original render function
        const originalRender = render;

        async function render(msg) {
            const div = document.createElement("div");
            div.className = "msg";
            div.id = `msg-${msg.id}`;

            // Add sender/receiver distinction
            if (msg.senderId === currentUserId) {
                div.classList.add('sender');
            } else {
                div.classList.add('receiver');
            }

            // Handle text messages
            if (msg.text) {
                const decryptedText = await decryptData(msg.text.payload, msg.text.iv);
                div.innerText = decryptedText;
            }

            // Handle file messages
            if (msg.file && msg.type) {
                const decryptedData = await decryptFileData(msg.file.payload, msg.file.iv);
                
                if (decryptedData) {
                    const mediaDiv = document.createElement('div');
                    mediaDiv.className = 'msg-media';
                    mediaDiv.id = `media-${msg.id}`;

                    if (msg.type === 'image') {
                        const img = document.createElement('img');
                        img.src = decryptedData;
                        img.alt = msg.fileName || 'Shared Image';
                        img.style.cursor = 'pointer';
                        
                        // Handle view-once for images
                        if (msg.viewOnce && msg.senderId !== currentUserId) {
                            const badge = document.createElement('div');
                            badge.className = 'view-once-badge';
                            badge.textContent = 'View Once';
                            mediaDiv.appendChild(badge);
                            
                            img.onclick = () => {
                                markMediaAsViewed(mediaDiv, msg);
                            };
                        } else {
                            img.onclick = () => downloadFile(decryptedData, msg.fileName, 'image');
                        }
                        
                        mediaDiv.appendChild(img);
                        if (msg.viewOnce && msg.senderId !== currentUserId) {
                            img.onclick = null;
                            setupReceiverMedia(mediaDiv, img, msg, false);
                        }
                    } else if (msg.type === 'video') {
                        const video = document.createElement('video');
                        video.controls = true;
                        video.style.cursor = 'pointer';
                        
                        // Handle ArrayBuffer -> Blob for video
                        if (decryptedData instanceof ArrayBuffer) {
                            const blob = new Blob([decryptedData], { type: msg.mimeType });
                            video.src = URL.createObjectURL(blob);
                        } else {
                            video.src = decryptedData;
                        }
                        
                        // Handle view-once for videos
                        if (msg.viewOnce && msg.senderId !== currentUserId) {
                            const badge = document.createElement('div');
                            badge.className = 'view-once-badge';
                            badge.textContent = 'View Once';
                            mediaDiv.appendChild(badge);
                            
                            video.onclick = () => {
                                markMediaAsViewed(mediaDiv, msg);
                            };
                        }
                        
                        mediaDiv.appendChild(video);
                        if (msg.viewOnce && msg.senderId !== currentUserId) {
                            video.onclick = null;
                            video.controls = false;
                            setupReceiverMedia(mediaDiv, video, msg, true);
                        }
                    }

                    div.appendChild(mediaDiv);
                }
            }

            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            // Auto-delete after 5 minutes
            scheduleAutoDelete(msg, div);
        }

        function setupReceiverMedia(mediaDiv, media, msg, isVideo) {
            mediaDiv.classList.add('locked');
            mediaDiv.classList.remove('revealed', 'viewed');

            let badge = mediaDiv.querySelector('.view-once-badge');
            if (!badge) {
                badge = document.createElement('div');
                badge.className = 'view-once-badge';
                mediaDiv.appendChild(badge);
            }
            badge.textContent = 'View Once';

            let overlay = mediaDiv.querySelector('.view-once-overlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.className = 'view-once-overlay';
                mediaDiv.appendChild(overlay);
            }
            overlay.textContent = 'Click to view';

            let doneBtn = mediaDiv.querySelector('.media-done-btn');
            if (!doneBtn) {
                doneBtn = document.createElement('button');
                doneBtn.type = 'button';
                doneBtn.className = 'media-done-btn';
                doneBtn.textContent = 'Done';
                mediaDiv.appendChild(doneBtn);
            }

            const revealMedia = () => {
                if (mediaDiv.classList.contains('viewed')) {
                    alert("This file has already been viewed and is no longer available.");
                    return;
                }

                mediaDiv.classList.remove('locked');
                mediaDiv.classList.add('revealed');
                badge.textContent = 'Viewing';
                media.style.cursor = isVideo ? 'default' : 'pointer';

                if (isVideo) {
                    media.controls = true;
                    media.play().catch(() => {});
                }
            };

            mediaDiv.addEventListener('click', () => {
                if (mediaDiv.classList.contains('locked')) {
                    revealMedia();
                }
            });

            if (!isVideo) {
                media.addEventListener('click', () => {
                    if (mediaDiv.classList.contains('revealed')) {
                        markMediaAsViewed(mediaDiv, msg);
                    }
                });
            } else {
                media.addEventListener('ended', () => {
                    if (mediaDiv.classList.contains('revealed')) {
                        removeMessageNow(msg);
                    }
                });
            }

            doneBtn.addEventListener('click', (event) => {
                event.stopPropagation();
                markMediaAsViewed(mediaDiv, msg);
            });
        }

        function markMediaAsViewed(mediaDiv, msg) {
            // Check if already viewed
            if (mediaDiv.classList.contains('viewed')) {
                alert("This file has already been viewed and is no longer available.");
                return;
            }

            // Mark as viewed
            mediaDiv.classList.remove('locked', 'revealed');
            mediaDiv.classList.add('viewed');
            
            // Blur the media and disable interaction
            const media = mediaDiv.querySelector('img, video');
            if (media) {
                media.onclick = null;
                media.controls = false;
                media.pause?.();
            }

            const badge = mediaDiv.querySelector('.view-once-badge');
            if (badge) badge.textContent = 'Viewed';

            const doneBtn = mediaDiv.querySelector('.media-done-btn');
            if (doneBtn) doneBtn.remove();

            const msgDiv = document.getElementById(`msg-${msg.id}`);
            if (msgDiv) {
                scheduleAutoDelete(msg, msgDiv);
            }
        }

        function removeMessageNow(msg) {
            const timerKey = msg.dbKey || msg.id;
            if (deletionTimers.has(timerKey)) {
                clearTimeout(deletionTimers.get(timerKey));
                deletionTimers.delete(timerKey);
            }

            const msgDiv = document.getElementById(`msg-${msg.id}`);
            if (msgDiv) {
                const video = msgDiv.querySelector('video');
                if (video) {
                    video.pause();
                    if (video.src.startsWith('blob:')) {
                        URL.revokeObjectURL(video.src);
                    }
                }
                msgDiv.remove();
            }

            if (msg.dbKey && dbRef) {
                dbRef.child(msg.dbKey).remove();
            }
        }

        async function decryptFileData(encryptedB64, ivB64) {
            if (!cryptoKey) return null;
            try {
                const encrypted = base64ToUint8Array(encryptedB64);
                const iv = base64ToUint8Array(ivB64);
                const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, cryptoKey, encrypted);
                
                // Try to decode as text (for images stored as data URLs)
                try {
                    return new TextDecoder().decode(decrypted);
                } catch {
                    // If it fails, return as ArrayBuffer (for video files)
                    return decrypted;
                }
            } catch (e) {
                console.error("File decryption failed:", e);
                return null;
            }
        }

        function downloadFile(data, fileName, type) {
            try {
                let link = document.createElement('a');
                
                if (type === 'image') {
                    link.href = data;
                } else if (type === 'video' && data instanceof ArrayBuffer) {
                    const blob = new Blob([data], { type: 'video/mp4' });
                    link.href = URL.createObjectURL(blob);
                }

                link.download = fileName || `download_${Date.now()}`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                if (type === 'video' && data instanceof ArrayBuffer) {
                    URL.revokeObjectURL(link.href);
                }
            } catch (e) {
                console.error("Download failed:", e);
                alert("Download failed. Please try again.");
            }
        }

        function createLink() {
            const randomBytes = new Uint8Array(16);
            crypto.getRandomValues(randomBytes);
            const key = btoa(String.fromCharCode(...randomBytes)).replace(/[+/=]/g, "");
            const link = `${location.origin}${location.pathname}#key=${key}`;

            showSystemMessage(`Secure room invite link generated: ${link}`);

            if (navigator.clipboard?.writeText) {
                navigator.clipboard.writeText(link).then(() => {
                    showSystemMessage("Room invite link copied to clipboard.");
                }).catch(() => {
                    showSystemMessage("Copy failed. Select and copy the generated link above.");
                });
            }
        }

        function toggleBackground() {
            const button = document.getElementById("toggleBgBtn");
            document.body.classList.toggle("bg-off");
            button.textContent = document.body.classList.contains("bg-off")
                ? "Turn On Background"
                : "Turn Off Background";
        }

        function showSystemMessage(text) {
            const div = document.createElement("div");
            div.className = "msg receiver";
            div.innerText = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        let presenceRoomRef = null;
        let currentPresenceRef = null;
        let presenceConnectedRef = null;
        let presenceHeartbeatTimer = null;
        const PRESENCE_STALE_AFTER = 70000;
        const PRESENCE_HEARTBEAT_EVERY = 25000;

        function setOnlineStatus(text, isOnline, onlineCount = 0) {
            const onlineText = document.getElementById("onlineText");
            const onlineDot = document.getElementById("onlineDot");
            const onlineCountEl = document.getElementById("onlineCount");

            onlineText.textContent = text;
            onlineDot.classList.toggle("active", isOnline);

            if (onlineCount > 1) {
                onlineCountEl.textContent = onlineCount;
                onlineCountEl.classList.add("visible");
            } else {
                onlineCountEl.textContent = "";
                onlineCountEl.classList.remove("visible");
            }
        }

        function setupPresence() {
            if (!sharedSecret) {
                setOnlineStatus("No chat connected", false);
                return;
            }

            if (!db) {
                setOnlineStatus("Chat unavailable", false);
                return;
            }

            if (presenceRoomRef) {
                presenceRoomRef.off();
            }
            if (presenceConnectedRef) {
                presenceConnectedRef.off();
            }
            if (presenceHeartbeatTimer) {
                clearInterval(presenceHeartbeatTimer);
            }

            presenceRoomRef = db.ref(`presence/${sharedSecret}`);
            currentPresenceRef = presenceRoomRef.child(currentUserId);
            presenceConnectedRef = db.ref(".info/connected");

            presenceConnectedRef.on("value", (snapshot) => {
                if (snapshot.val() !== true) {
                    if (presenceHeartbeatTimer) {
                        clearInterval(presenceHeartbeatTimer);
                        presenceHeartbeatTimer = null;
                    }
                    setOnlineStatus("Offline", false);
                    return;
                }

                currentPresenceRef.onDisconnect().remove();
                if (presenceHeartbeatTimer) {
                    clearInterval(presenceHeartbeatTimer);
                }
                updateCurrentPresence();
                presenceHeartbeatTimer = setInterval(updateCurrentPresence, PRESENCE_HEARTBEAT_EVERY);
            });

            presenceRoomRef.on("value", (snapshot) => {
                const users = snapshot.val() || {};
                const onlineUsers = Object.entries(users).filter(([, user]) => isActivePresence(user));
                const onlineCount = onlineUsers.length;

                if (onlineCount > 1) {
                    setOnlineStatus("Connected", true, onlineCount);
                } else if (onlineCount === 1 && isActivePresence(users[currentUserId])) {
                    setOnlineStatus("Waiting for others", false, onlineCount);
                } else {
                    setOnlineStatus("Connecting...", false);
                }
            }, () => {
                setOnlineStatus("Presence unavailable", false);
            });
        }

        function updateCurrentPresence() {
            if (!currentPresenceRef) return;

            currentPresenceRef.set({
                online: true,
                lastSeen: Date.now()
            }).catch(() => {
                setOnlineStatus("Presence unavailable", false);
            });
        }

        function isActivePresence(user) {
            return Boolean(
                user?.online &&
                typeof user.lastSeen === "number" &&
                Date.now() - user.lastSeen < PRESENCE_STALE_AFTER
            );
        }

        window.addEventListener("load", setupPresence);
        window.addEventListener("beforeunload", () => {
            if (presenceHeartbeatTimer) clearInterval(presenceHeartbeatTimer);
            if (currentPresenceRef) currentPresenceRef.remove();
        });
    </script>
