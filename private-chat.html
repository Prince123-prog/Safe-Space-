<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Secure Chat Room</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        /* Smooth mobile feel */
html, body {
    overscroll-behavior: none;
    touch-action: manipulation;
}

/* Better input spacing like WhatsApp */
.composed-input {
    position: sticky;
    bottom: 0;
    background: #111;
}

/* Messages fill space properly */
.messages {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Safe area for iPhone notch */
body {
    padding-bottom: env(safe-area-inset-bottom);
}

/* Bigger tap targets */
.icon-btn {
    min-width: 42px;
    min-height: 42px;
}

/* Prevent zoom on input focus (iOS fix) */
input#input {
    font-size: 16px;
}

/* Smooth scrolling */
.messages {
    scroll-behavior: smooth;
}

        body {
            max-width: 100%;
            height: 100vh;
            background: radial-gradient(circle at top, #10253f, #06110f 58%, #020504);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            animation: backgroundAnim 50s ease-in infinite;
            overflow: hidden;
        }

        @keyframes backgroundAnim {
            0% {
                background: radial-gradient(circle at top, #10253f, #06110f);
            }

            25% {
                background: radial-gradient(circle at top, #0f2f38, #071512);
            }

            50% {
                background: radial-gradient(circle at top, #063b3a, #021f1d);
            }

            75% {
                background: radial-gradient(circle at top, #082f49, #07110f);
            }

            100% {
                background: radial-gradient(circle at top, #0f172a, #021f1dcb);
            }
        }

        .chat-container {
            width: 90%;
            max-width: 550px;
            background: rgba(7, 17, 22, 0.78);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(94, 234, 212, 0.22);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.34), 0 0 28px rgba(45, 212, 191, 0.12);
            position: relative;
        }

        .title {
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.2rem;
            color: #5eead4;
            font-weight: 500;
        }

        .safe-box {
            margin: 0 auto 12px;
            padding: 10px 16px;
            background: linear-gradient(90deg, rgba(45, 212, 191, 0.14), rgba(56, 189, 248, 0.08));
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #d8c8c7;
            font-size: 0.9rem;
            text-align: center;
            border-radius: 12px;
            font-weight: 500;
            letter-spacing: 0.3px;
            text-transform: capitalize;
        }

        .safe-notice {
            position: absolute;
            top: 18px;
            right: 18px;
            padding: 10px 14px;
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.65), rgba(10, 15, 20, 0.5));
            color: #bfffe8;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(6px);
            font-weight: 600;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            animation: moveCorners 12s linear infinite;
            width: clamp(100px, 15vw, 220px);
            pointer-events: none;
        }

        @keyframes moveCorners {
            0% {
                background-color: rgba(255, 0, 0, 0.2);
                left: 0px;
                top: 0px;
            }

            25% {
                background-color: rgba(255, 255, 0, 0.2);
                left: calc(100% - 150px);
                top: 0px;
            }

            50% {
                background-color: rgba(0, 0, 255, 0.2);
                left: calc(100% - 150px);
                top: calc(100vh - 50px);
            }

            75% {
                background-color: rgba(0, 255, 0, 0.2);
                left: 0px;
                top: calc(100vh - 50px);
            }

            100% {
                background-color: rgba(255, 0, 0, 0.2);
                left: 0px;
                top: 0px;
            }
        }

        @media (max-width: 600px) {
            .safe-notice {
                display: none;
            }
        }

        .messages {
            height: 300px;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 10px 14px 10px 10px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.1);
            scrollbar-gutter: stable;
            scrollbar-width: auto;
            scrollbar-color: #5eead4 rgba(15, 23, 42, 0.78);
        }

        .messages::-webkit-scrollbar {
            width: 12px;
        }
        .messages::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.78);
            border: 1px solid rgba(94, 234, 212, 0.16);
            border-radius: 999px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #7dd3fc, #2dd4bf);
            border: 2px solid rgba(15, 23, 42, 0.9);
            border-radius: 999px;
            min-height: 42px;
        }
        .messages::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #bae6fd, #5eead4);
        }

        .msg {
            --participant-accent: #38bdf8;
            --participant-bg: rgba(56, 189, 248, 0.12);
            background: rgba(56, 189, 248, 0.12);
            padding: 10px 14px;
            border-radius: 15px;
            margin: 8px 0;
            animation: fadeIn 0.4s ease;
            word-wrap: break-word;
            font-size: 0.95rem;
            max-width: 85%;
        }

        /* Sender messages - right aligned, different color */
        .msg.sender {
            background: linear-gradient(135deg, var(--participant-bg), rgba(56, 189, 248, 0.16));
            margin-left: auto;
            border-right: 4px solid var(--participant-accent);
        }

        /* Receiver messages - left aligned */
        .msg.receiver {
            background: var(--participant-bg);
            margin-right: auto;
            border-left: 4px solid var(--participant-accent);
        }

        .msg-content {
            white-space: pre-wrap;
        }

        .read-receipt {
            display: block;
            margin-top: 6px;
            color: rgba(191, 255, 232, 0.78);
            font-size: 0.68rem;
            font-weight: 600;
            text-align: right;
            line-height: 1;
        }

        .msg.receiver .read-receipt {
            color: rgba(186, 230, 253, 0.7);
        }

        .read-receipt.seen {
            color: #5eead4;
        }

        /* Online status indicator */
        .online-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            padding: 4px 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            margin-bottom: 10px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
            animation: pulse 2s infinite;
        }

        .online-dot.active {
            background: #00ff88;
            box-shadow: 0 0 8px #00ff88;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .online-dot.active {
            animation: pulse 2s infinite;
        }

        .online-count {
            display: none;
            min-width: 18px;
            height: 18px;
            padding: 0 6px;
            border-radius: 999px;
            background: rgba(0, 255, 136, 0.18);
            border: 1px solid rgba(0, 255, 136, 0.45);
            color: #bfffe8;
            font-size: 0.7rem;
            line-height: 16px;
            text-align: center;
        }

        .online-count.visible {
            display: inline-block;
        }

        .typing-status {
            min-height: 18px;
            margin: 6px 8px 0;
            color: #9af5e6;
            font-size: 0.78rem;
            font-weight: 500;
            opacity: 0;
            transform: translateY(-2px);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .typing-status.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-area {
            margin-top: 15px;
        }

        .composed-input {
            display: flex;
            align-items: center;
            background: #111;
            border-radius: 20px;
            padding: 5px 10px;
            gap: 8px;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Private horizontal scrolling - hide scrollbar */
        .composed-input::-webkit-scrollbar {
            display: none;
        }

        input#input {
            flex: 1;
            min-width: 0;
            padding: 10px;
            background: transparent;
            color: #fff;
            border: none;
            outline: none;
            font-size: 1rem;
        }

        .action-buttons {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            align-items: center;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2dd4bf, #38bdf8);
            color: #fff;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
        }

        .icon-btn:hover {
            transform: scale(1.1);
            filter: brightness(1.1);
        }

        .icon-btn:active {
            transform: scale(0.9);
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
        }

        /* File Input - Hidden but functional */
        input#fileInput {
            display: none;
        }

        /* Media Message Display */
        .msg-media {
            margin-top: 8px;
            border-radius: 10px;
            overflow: hidden;
            max-width: 100%;
            background: rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .msg-media img,
        .msg-media video {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
            cursor: pointer;
            transition: filter 0.2s;
        }

        .msg-media:not(.locked):not(.viewed) img:hover,
        .msg-media:not(.locked):not(.viewed) video:hover {
            filter: brightness(0.9);
        }

        .msg-media video {
            width: 100%;
        }

        /* View-Once Badge */
        .view-once-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(20, 184, 166, 0.92);
            color: #fff;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            z-index: 10;
        }

        .view-once-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.45);
            color: #fff;
            font-size: 0.85rem;
            font-weight: 700;
            text-align: center;
            padding: 16px;
            z-index: 8;
            cursor: pointer;
        }

        .media-done-btn {
            position: absolute;
            right: 8px;
            bottom: 8px;
            display: none;
            border: none;
            border-radius: 16px;
            padding: 7px 12px;
            background: rgba(45, 212, 191, 0.95);
            color: #02110f;
            font-weight: 700;
            cursor: pointer;
            z-index: 12;
        }

        .msg-media.locked img,
        .msg-media.locked video,
        .msg-media.viewed img,
        .msg-media.viewed video {
            filter: blur(10px);
        }

        .msg-media.locked video,
        .msg-media.viewed video {
            pointer-events: none;
        }

        .msg-media.revealed .view-once-overlay {
            display: none;
        }

        .msg-media.revealed .media-done-btn {
            display: block;
        }

        .msg-media.viewed .view-once-overlay,
        .msg-media.viewed .media-done-btn {
            display: none;
        }

        /* Viewed/Expired State */
        .msg-media.viewed {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .msg-media.viewed::after {
            content: 'Viewed';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            text-align: center;
            width: 80%;
            z-index: 20;
        }

        .loading-spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #2dd4bf;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            font-size: 0.7rem;
            opacity: 0.5;
            margin-top: 10px;
        }

        .link-btn {
            background: #2dd4bf;
            color: #02110f;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 10px;
            width: 100%;
        }
        /* When toggled, remove animated/background visuals for accessibility or preference */
        .bg-off {
            background: none !important;
            background-color: #ffffffb7 !important;
            color: #111 !important;
            animation: none !important;
        }

        @media (min-width: 769px) {
            body {
                padding: clamp(18px, 3vw, 36px);
            }

            .chat-container {
                width: min(88vw, 720px);
                max-width: 720px;
                padding: clamp(18px, 2.4vw, 28px);
            }

            .title {
                font-size: clamp(1.15rem, 1.6vw, 1.45rem);
            }

            .safe-box {
                max-width: 540px;
            }

            .input-area {
                margin-top: clamp(12px, 1.6vw, 18px);
            }

            .composed-input {
                border-radius: 18px;
                padding: 7px 10px 7px 14px;
            }

            input#input {
                padding: 11px 10px;
            }
        }

        /* Mobile Responsive Styles */
        @media (max-width: 480px) {
            body {
                padding: max(8px, env(safe-area-inset-top)) max(8px, env(safe-area-inset-right)) max(8px, env(safe-area-inset-bottom)) max(8px, env(safe-area-inset-left));
                height: 100dvh;
                overflow: hidden;
                align-items: stretch;
            }

            .chat-container {
                width: 100%;
                max-width: 100%;
                height: 100%;
                min-height: 0;
                padding: 10px;
                border-radius: 12px;
                display: flex;
                flex-direction: column;
            }

            .title {
                font-size: 1rem;
                margin-bottom: 10px;
            }

            .safe-box {
                font-size: 0.75rem;
                padding: 8px 12px;
                margin-bottom: 10px;
            }

            .link-btn {
                padding: 10px 12px;
                font-size: 0.85rem;
            }

            .messages {
                flex: 1;
                height: auto;
                min-height: 0;
                padding: 8px 12px 8px 8px;
                font-size: 0.9rem;
                overflow-x: hidden;
            }

            .msg {
                padding: 8px 10px;
                font-size: 0.85rem;
                max-width: 90%;
            }

            .input-area {
                margin-top: 10px;
                flex-shrink: 0;
            }

            .composed-input {
                padding: 5px 8px;
                gap: 4px;
                overflow-x: hidden;
                -webkit-overflow-scrolling: touch;
                -ms-overflow-style: none;
                scrollbar-width: none;
            }

            /* Hide horizontal scrollbar in input */
            .composed-input::-webkit-scrollbar {
                display: none;
            }

            input#input {
                padding: 8px;
                font-size: 0.9rem;
            }

            .icon-btn {
                width: 38px;
                height: 38px;
                min-width: 38px;
                min-height: 38px;
            }

            .icon-btn svg {
                width: 18px;
                height: 18px;
            }

            .footer {
                font-size: 0.6rem;
                margin-top: 8px;
            }
        }

        /* Tablet Styles */
        @media (min-width: 481px) and (max-width: 768px) {
            .chat-container {
                width: 95%;
                padding: 15px;
            }

            .messages {
                height: 250px;
            }
        }

        /* Small mobile adjustments */
        @media (max-width: 360px) {
            .chat-container {
                padding: 10px;
            }

            .title {
                font-size: 0.9rem;
            }

            .safe-box {
                font-size: 0.7rem;
            }

            .msg {
                font-size: 0.8rem;
                padding: 6px 8px;
            }

            .action-buttons {
                gap: 4px;
            }
        }
    </style>
</head>

    <script>
        /* --------------------------
                                    CRYPTO LOGIC
                                    -------------------------- */
        let cryptoKey = null;
        const params = new URLSearchParams(location.hash.substring(1));
        const sharedSecret = params.get("key");

        if (!sharedSecret) {
            document.getElementById("messages").innerHTML = `<div class='msg' style='background:rgba(255,165,0,0.2)'>No chat room connected. Please use a secure link or generate one below.</div>`;
        }

        let cryptoReadyPromise = Promise.resolve();

        async function initCrypto(secret) {
            const enc = new TextEncoder();
            try {
                const baseKey = await crypto.subtle.importKey(
                    "raw", enc.encode(secret), "PBKDF2", false, ["deriveKey"]
                );
                cryptoKey = await crypto.subtle.deriveKey(
                    { name: "PBKDF2", salt: enc.encode("private-chat"), iterations: 100000, hash: "SHA-256" },
                    baseKey,
                    { name: "AES-GCM", length: 256 },
                    false,
                    ["encrypt", "decrypt"]
                );
                console.log("Encryption initialized");
            } catch (e) {
                console.error("Crypto init failed", e);
            }
        }

        if (sharedSecret) cryptoReadyPromise = initCrypto(sharedSecret);

        function arrayBufferToBase64(buffer) {
            const bytes = new Uint8Array(buffer);
            const chunkSize = 0x8000;
            let binary = "";

            for (let i = 0; i < bytes.length; i += chunkSize) {
                binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
            }

            return btoa(binary);
        }

        function base64ToUint8Array(base64) {
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);

            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }

            return bytes;
        }

        async function encryptData(data) {
            if (!cryptoKey) {
                await cryptoReadyPromise;
                if (!cryptoKey) return null;
            }
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encrypted = await crypto.subtle.encrypt(
                { name: "AES-GCM", iv },
                cryptoKey,
                new TextEncoder().encode(data)
            );
            return {
                payload: arrayBufferToBase64(encrypted),
                iv: arrayBufferToBase64(iv)
            };
        }

        async function decryptData(encryptedB64, ivB64) {
            if (!cryptoKey) return "Error: No Key";
            try {
                const encrypted = base64ToUint8Array(encryptedB64);
                const iv = base64ToUint8Array(ivB64);
                const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, cryptoKey, encrypted);
                return new TextDecoder().decode(decrypted);
            } catch (e) {
                return "[Decryption Failed]";
            }
        }
        </script> 

      <script>

    { accent: "#38bdf8", bg: "rgba(56, 189, 248, 0.16)" },
    { accent: "#f59e0b", bg: "rgba(245, 158, 11, 0.14)" },

// ==========================
// LOAD CHAT
// ==========================
async function setupChat() {
    if (!sharedSecret) return;
    if (!db) {
        alert("Chat service is unavailable. Please refresh and try again.");
        return;
    }

    dbRef = db.ref(`chats/${sharedSecret}`);

    dbRef.on('child_added', async (snapshot) => {
        const msg = snapshot.val();
        msg.dbKey = snapshot.key;

        if (handleRealtimeStateMessage(msg)) {
            return;
        }

        if (handleRoomActivityReceipt(msg)) {
            return;
        }

        if (isStaleTextMessage(msg)) {
            dbRef.child(msg.dbKey).remove();
            return;
        }

        trackRoomActivity(msg.senderId);
        sendRoomActivityReceipt(msg);

        if (!renderingMessages.has(msg.id)) {
            renderingMessages.add(msg.id);
            await render(msg);
        }
    });

    dbRef.on('child_changed', (snapshot) => {
        const msg = snapshot.val();
        msg.dbKey = snapshot.key;

        if (handleRealtimeStateMessage(msg) || handleRoomActivityReceipt(msg)) {
            return;
        }

        updateReadReceipt(msg);
    });
}

window.addEventListener("load", setupChat);

function isStaleTextMessage(msg) {
    return Boolean(msg.text && !msg.file && (msg.time || 0) < pageLoadedAt);
}

function handleRoomActivityReceipt(msg) {
    if (msg?.type !== "activity-receipt") return false;

    trackRoomActivity(msg.senderId);
    trackRoomActivity(msg.receivedFrom);

    const expiresAt = (msg.time || Date.now()) + 300000;
    const delay = Math.max(0, expiresAt - Date.now());
    setTimeout(() => {
        if (msg.dbKey && dbRef) {
            dbRef.child(msg.dbKey).remove();
        }
    }, delay);

    return true;
}

function handleRealtimeStateMessage(msg) {
    return msg?.type === "presence-state";
}

function trackRoomActivity(userId) {
    if (!userId) return;

    roomActivityUsers.add(userId);
}

function sendRoomActivityReceipt(msg) {
    if (!dbRef || !msg?.senderId || msg.senderId === currentUserId) return;
    if (receiptSentForUsers.has(msg.senderId)) return;

    receiptSentForUsers.add(msg.senderId);
    const receiptRef = dbRef.push();
    receiptRef.set({
        id: `receipt_${currentUserId}_${Date.now()}_${Math.random()}`,
        type: "activity-receipt",
        time: Date.now(),
        senderId: currentUserId,
        receivedFrom: msg.senderId,
        receivedMessageId: msg.id || ""
    }).catch(() => {
        receiptSentForUsers.delete(msg.senderId);
    });
}

// ==========================
// SEND TEXT
// ==========================
async function send() {
    if (!sharedSecret) return alert("Open a chat link first");

    const textValue = input.value.trim();
    if (!textValue) return;

    const enc = await encryptData(textValue);
    if (!enc) {
        alert("Encryption is not ready yet. Please wait a moment and try again.");
        return;
    }

    const msg = {
        id: Date.now() + "_" + Math.random(),
        time: Date.now(),
        senderId: currentUserId,
        text: enc
    };

    finalizeSend(msg);
    input.value = "";
    stopTypingNow();
}

// ==========================
// FINAL SEND
// ==========================
function finalizeSend(msg) {
    if (!dbRef) return;

    const newRef = dbRef.push();
    msg.dbKey = newRef.key;

    newRef.set(msg).catch(() => {
        showSystemMessage("Message could not be sent. Please try again.");
    });
}

function isOwnMessage(msg) {
    return msg?.senderId === currentUserId;
}

function hasSeenMessage(msg) {
    if (!msg?.readBy) {
        return false;
    }

    return Object.keys(msg.readBy).some((readerId) => readerId !== msg.senderId);
}

function getReceiptText(msg) {
    if (isOwnMessage(msg)) {
        return hasSeenMessage(msg) ? "Seen \u2713\u2713" : "Sent \u2713";
    }

    return msg?.readBy?.[currentUserId] ? "Seen \u2713\u2713" : "";
}

function appendReadReceipt(div, msg) {
    let receipt = div.querySelector(".read-receipt");
    if (!receipt) {
        receipt = document.createElement("span");
        receipt.className = "read-receipt";
        div.appendChild(receipt);
    }

    updateReadReceiptElement(receipt, msg);
}

function updateReadReceipt(msg) {
    const div = document.getElementById(`msg-${msg.id}`);
    if (!div) return;

    const receipt = div.querySelector(".read-receipt");
    if (!receipt) return;

    updateReadReceiptElement(receipt, msg);
}

function updateReadReceiptElement(receipt, msg) {
    const text = getReceiptText(msg);
    receipt.textContent = text;
    receipt.classList.toggle("seen", text === "Seen \u2713\u2713");
    receipt.hidden = !text;
}

function markMessageRead(msg) {
    if (!dbRef || !msg?.dbKey || !msg?.id || isOwnMessage(msg)) return;
    if (msg.readBy?.[currentUserId]) return;

    const updateKey = `${msg.dbKey}_${currentUserId}`;
    if (localReadUpdates.has(updateKey)) return;
    localReadUpdates.add(updateKey);

    dbRef.child(msg.dbKey).child(`readBy/${currentUserId}`).set(Date.now()).catch(() => {
        localReadUpdates.delete(updateKey);
    });
}

function getParticipantColor(senderId) {
    const id = String(senderId || "unknown");
    let hash = 0;

    for (let i = 0; i < id.length; i++) {
        hash = ((hash << 5) - hash) + id.charCodeAt(i);
        hash |= 0;
    }

    return PARTICIPANT_COLORS[Math.abs(hash) % PARTICIPANT_COLORS.length];
}

function applyParticipantStyle(div, msg) {
    const color = getParticipantColor(msg?.senderId);
    div.style.setProperty("--participant-accent", color.accent);
    div.style.setProperty("--participant-bg", color.bg);
}

// ==========================
function openFileDialog() {

    fileInput.value = "";
    fileInput.click();

function handleFileSelect(e) {

    sendFile(file);
}

function sendFile(file) {
    const reader = new FileReader();

    reader.onload = async (e) => {
        const fileData = e.target.result;

        const msg = {
            id: Date.now() + "_" + Math.random(),
            time: Date.now(),
            senderId: currentUserId,
            type: file.type.startsWith('image/') ? 'image' : 'video',
            fileName: file.name
        };

        const enc = await encryptData(fileData);
        msg.file = enc;

        finalizeSend(msg);
    };

    reader.readAsDataURL(file);
}

// ==========================
// RENDER
// ==========================
async function render(msg) {
    const div = document.createElement("div");
    div.className = "msg";
    div.id = `msg-${msg.id}`;

    // sender / receiver
    if (msg.senderId === currentUserId) {
        div.classList.add("sender");
    } else {
        div.classList.add("receiver");
    }
    applyParticipantStyle(div, msg);

    // TEXT
    if (msg.text) {
        const txt = await decryptData(msg.text.payload, msg.text.iv);
        const content = document.createElement("div");
        content.className = "msg-content";
        content.textContent = txt;
        div.appendChild(content);
    }

    // FILE
    if (msg.file && msg.type) {
        const data = await decryptFileData(msg.file.payload, msg.file.iv);

        const mediaDiv = document.createElement("div");
        mediaDiv.className = "msg-media";

        if (msg.type === "image") {
            const img = document.createElement("img");
            img.src = data;

            if (msg.senderId !== currentUserId) {
                setupReceiverMedia(mediaDiv, img, msg, false);
            } else {
                img.onclick = () => downloadFile(data, msg.fileName);
            }

            mediaDiv.appendChild(img);
        }

        if (msg.type === "video") {
            const video = document.createElement("video");
            video.src = data;
            video.controls = true;

            if (msg.senderId !== currentUserId) {
                video.controls = false;
                setupReceiverMedia(mediaDiv, video, msg, true);
            }

            mediaDiv.appendChild(video);
        }

        div.appendChild(mediaDiv);
    }

    appendReadReceipt(div, msg);
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;

    if (!isOwnMessage(msg)) {
        markMessageRead(msg);
        msg.readBy = { ...(msg.readBy || {}), [currentUserId]: Date.now() };
        updateReadReceipt(msg);
    }

    if (shouldPlayMessageSound(msg)) {
        playChatSound(msg.senderId === currentUserId ? "sent" : "received");
    }

    scheduleAutoDelete(msg, div);
}

// ==========================
// VIEW-ONCE LOGIC
// ==========================
function setupReceiverMedia(container, media, msg, isVideo) {
    container.classList.add("locked");

    const overlay = document.createElement("div");
    overlay.className = "view-once-overlay";
    overlay.innerText = "Click to view";
    container.appendChild(overlay);

    container.onclick = () => {
        container.classList.remove("locked");
        overlay.remove();

        if (isVideo) {
            media.controls = true;
            media.play();
            media.onended = () => markViewed(container);
        } else {
            media.onclick = () => markViewed(container);
        }
    };
}

function markViewed(container) {
    container.classList.add("viewed");
}

// ==========================
// DECRYPT FILE
// ==========================
async function decryptFileData(payload, iv) {
    try {
        const decrypted = await decryptData(payload, iv);
        return decrypted;
    } catch {
        return null;
    }
}

// ==========================
// DOWNLOAD
// ==========================
function downloadFile(data, name) {
    const a = document.createElement("a");
    a.href = data;
    a.download = name || "file";
    a.click();
}

// ==========================
// AUTO DELETE
// ==========================
function scheduleAutoDelete(msg, div) {
    const timerKey = msg.dbKey || msg.id;
    if (deletionTimers.has(timerKey)) {
        clearTimeout(deletionTimers.get(timerKey));
    }

    const expiresAt = (msg.time || Date.now()) + 300000;
    const delay = Math.max(0, expiresAt - Date.now());
    const timerId = setTimeout(() => {
        div.remove();
        if (msg.dbKey && dbRef) {
            dbRef.child(msg.dbKey).remove();
        }
        deletionTimers.delete(timerKey);
    }, delay);

    deletionTimers.set(timerKey, timerId);
}

function shouldPlayMessageSound(msg) {
    return (msg.time || 0) >= pageLoadedAt - 2000;
}

// ENTER SEND
input.onkeypress = (e) => {
    if (e.key === "Enter") send();
};

                return null;

            }
        }

        function updateRoomAvailabilityStatus() {
            if (latestOtherOnlineCount > 0) {
                const label = latestOtherOnlineCount === 1
                    ? "Online"
                    : `${latestOtherOnlineCount} people online`;
                setOnlineStatus(label, true, latestOtherOnlineCount + 1);
                return true;
            }

            setOnlineStatus("Offline", false, latestPresenceOnlineCount);
            return false;
        }

        function announcePresenceChange(otherOnlineCount) {
            if (previousOtherOnlineCount === null) {
                previousOtherOnlineCount = otherOnlineCount;
                return;
            }

            if (otherOnlineCount === previousOtherOnlineCount) return;

            if (otherOnlineCount > previousOtherOnlineCount) {
                showSystemMessage(otherOnlineCount === 1
                    ? "The person you are chatting with is online."
                    : `${otherOnlineCount} other people are online.`);
            } else if (otherOnlineCount === 0) {
                showSystemMessage("The person you are chatting with is offline.");
            } else {
                showSystemMessage(`${otherOnlineCount} other people are still online.`);
            }

            previousOtherOnlineCount = otherOnlineCount;
        }

        function updateTypingStatus(typingUsers) {
            const typingStatus = document.getElementById("typingStatus");
            if (!typingStatus) return;

            if (!typingUsers.length) {
                typingStatus.textContent = "";
                typingStatus.classList.remove("visible");
                return;
            }

            typingStatus.textContent = typingUsers.length === 1
                ? "Typing..."
                : `${typingUsers.length} people are typing...`;
            typingStatus.classList.add("visible");
        }

        function setupPresence() {
            if (!sharedSecret) {
                setOnlineStatus("No chat connected", false);
                return;
            }

            if (!db) {
                setOnlineStatus("Chat unavailable", false);
                return;
            }

            if (presenceRoomRef) {
                presenceRoomRef.off();
            }
            if (presenceConnectedRef) {
                presenceConnectedRef.off();
            }
            if (presenceHeartbeatTimer) {
                clearInterval(presenceHeartbeatTimer);
            }

            presenceRoomRef = db.ref(`chats/${sharedSecret}`);
            currentPresenceRef = presenceRoomRef.child(`__presence_${currentUserId}`);
            currentTypingRef = currentPresenceRef.child("typing");
            presenceConnectedRef = db.ref(".info/connected");

            presenceConnectedRef.on("value", (snapshot) => {
                if (snapshot.val() !== true) {
                    if (presenceHeartbeatTimer) {
                        clearInterval(presenceHeartbeatTimer);
                        presenceHeartbeatTimer = null;
                    }
                    if (!updateRoomAvailabilityStatus()) {
                        setOnlineStatus("Offline", false);
                    }
                    return;
                }

                currentPresenceRef.onDisconnect().remove();
                currentTypingRef.onDisconnect().remove();
                if (presenceHeartbeatTimer) {
                    clearInterval(presenceHeartbeatTimer);
                }
                updateCurrentPresence();
                presenceHeartbeatTimer = setInterval(updateCurrentPresence, PRESENCE_HEARTBEAT_EVERY);
            });

            presenceRoomRef.on("value", (snapshot) => {
                const users = snapshot.val() || {};
                const presenceUsers = Object.entries(users).filter(([, user]) => user?.type === "presence-state");
                const onlineUsers = presenceUsers.filter(([, user]) => isActivePresence(user));
                const onlineCount = onlineUsers.length;
                const otherOnlineUsers = onlineUsers.filter(([, user]) => user.senderId !== currentUserId);
                const typingUsers = otherOnlineUsers.filter(([, user]) => isActiveTyping(user));
                latestPresenceOnlineCount = onlineCount;
                latestOtherOnlineCount = otherOnlineUsers.length;
                updateTypingStatus(typingUsers);
                announcePresenceChange(latestOtherOnlineCount);

                if (updateRoomAvailabilityStatus()) {
                    return;
                } else if (onlineCount === 1 && onlineUsers.some(([, user]) => user.senderId === currentUserId)) {
                    setOnlineStatus("Offline", false, onlineCount);
                } else {
                    setOnlineStatus("Connecting...", false);
                }
            }, () => {
                if (!updateRoomAvailabilityStatus()) {
                    setOnlineStatus("Presence unavailable", false);
                }
            });
        }

        function updateCurrentPresence() {
            if (!currentPresenceRef) return;

            currentPresenceRef.update({
                id: `presence_${currentUserId}`,
                type: "presence-state",
                time: Date.now(),
                senderId: currentUserId,
                online: true,
                lastSeen: Date.now(),
                pageVisible: document.visibilityState === "visible"
            }).catch(() => {
                if (!updateRoomAvailabilityStatus()) {
                    setOnlineStatus("Presence unavailable", false);
                }
            });
        }

        function isActivePresence(user) {
            return Boolean(
                user?.online &&
                typeof user.lastSeen === "number" &&
                Date.now() - user.lastSeen < PRESENCE_STALE_AFTER
            );
        }

        function isActiveTyping(user) {
            return Boolean(
                isActivePresence(user) &&
                user.typing &&
                typeof user.typingAt === "number" &&
                Date.now() - user.typingAt < TYPING_IDLE_AFTER
            );
        }

        function updateTypingState(isTyping) {
            if (!currentPresenceRef) return;
            if (!isTyping && !isCurrentlyTyping) return;

            isCurrentlyTyping = isTyping;
            currentPresenceRef.update({
                id: `presence_${currentUserId}`,
                type: "presence-state",
                time: Date.now(),
                senderId: currentUserId,
                typing: isTyping,
                typingAt: isTyping ? Date.now() : null,
                lastSeen: Date.now()
            }).catch(() => {});
        }

        function scheduleTypingStop() {
            if (typingStopTimer) clearTimeout(typingStopTimer);
            typingStopTimer = setTimeout(stopTypingNow, TYPING_IDLE_AFTER);
        }

        function stopTypingNow() {
            if (typingStopTimer) {
                clearTimeout(typingStopTimer);
                typingStopTimer = null;
            }

            if (!isCurrentlyTyping && !currentPresenceRef) return;
            isCurrentlyTyping = false;
            if (currentPresenceRef) {
                currentPresenceRef.update({
                    id: `presence_${currentUserId}`,
                    type: "presence-state",
                    time: Date.now(),
                    senderId: currentUserId,
                    typing: false,
                    typingAt: null,
                    lastSeen: Date.now()
                }).catch(() => {});
            }
        }

        function unlockChatSounds() {
            if (soundUnlocked) return;
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                chatAudioContext = chatAudioContext || new AudioContext();
                chatAudioContext.resume?.();
                soundUnlocked = true;
            } catch (error) {
                soundUnlocked = false;
            }
        }

        function playChatSound(type) {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;

                chatAudioContext = chatAudioContext || new AudioContext();
                if (chatAudioContext.state === "suspended") {
                    chatAudioContext.resume?.();
                }

                const now = chatAudioContext.currentTime;
                const oscillator = chatAudioContext.createOscillator();
                const gain = chatAudioContext.createGain();

                oscillator.type = "sine";
                oscillator.frequency.setValueAtTime(type === "sent" ? 660 : 520, now);
                oscillator.frequency.exponentialRampToValueAtTime(type === "sent" ? 880 : 390, now + 0.12);
                gain.gain.setValueAtTime(0.0001, now);
                gain.gain.exponentialRampToValueAtTime(type === "sent" ? 0.08 : 0.1, now + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);

                oscillator.connect(gain);
                gain.connect(chatAudioContext.destination);
                oscillator.start(now);
                oscillator.stop(now + 0.18);
            } catch (error) {
                // Browsers can block audio until the first user interaction.
            }
        }

        input.addEventListener("input", () => {
            unlockChatSounds();

            if (input.value.trim()) {
                updateTypingState(true);
                scheduleTypingStop();
            } else {
                stopTypingNow();
            }
        });

        input.addEventListener("blur", stopTypingNow);
        document.addEventListener("visibilitychange", () => {
            updateCurrentPresence();
            if (document.visibilityState !== "visible") {
                stopTypingNow();
            }
        });
        document.addEventListener("pointerdown", unlockChatSounds, { once: true });
        document.addEventListener("keydown", unlockChatSounds, { once: true });

        window.addEventListener("load", setupPresence);
        window.addEventListener("beforeunload", () => {
            if (presenceHeartbeatTimer) clearInterval(presenceHeartbeatTimer);
            if (typingStopTimer) clearTimeout(typingStopTimer);
            if (currentPresenceRef) currentPresenceRef.remove();
        });
    </script>

</body>

</html>
